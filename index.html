<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="script.js">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="d-flex gap-1 justify-content-center align-items-center vh-100 flex-column bg-secondary">
        <h1 class="mb-1" id="text">Formulário JS</h1> 
        <h5 id="description" class="text-bg-secondary">Insert below the following informations:</h5>
        
        <form id="form_login">
            <label for="name">Name</label>
            <input type="text" name="name" id="name" placeholder="Your name">
            
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Your email">
            
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Your password">
            
            <button type="submit" id="bt" disabled>Send</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
